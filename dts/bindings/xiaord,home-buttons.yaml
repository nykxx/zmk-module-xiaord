description: |
  Home screen circle button ring configuration.

  Defines which of the 12 fixed clock-position slots are populated,
  what icon they display, and whether they navigate to another page on tap.

  Example:

    home_buttons {
        compatible = "xiaord,home-buttons";

        btn_upload {
            position = <0>;
            symbol = <ICON_UPLOAD>;
        };
        btn_bt {
            position = <9>;
            symbol = <ICON_BLUETOOTH>;
            nav-page = <XIAORD_PAGE_BT>;
        };
    };

compatible: "xiaord,home-buttons"

child-binding:
  description: Single button in the home screen circle ring.
  properties:
    position:
      type: int
      required: true
      description: >
        Clock-position slot index (0–11). 0 = 12 o'clock, 1 = 1 o'clock,
        clockwise in 30-degree steps.

    symbol:
      type: int
      required: true
      description: >
        Unicode codepoint of the icon glyph.
        Use ICON_* constants from dt-bindings/xiaord/icons.h.

    nav-page:
      type: int
      description: >
        XIAORD_PAGE_* index to navigate to on tap. Omit for no navigation.

    dismiss:
      type: boolean
      description: >
        If true, hide the button ring on tap.
