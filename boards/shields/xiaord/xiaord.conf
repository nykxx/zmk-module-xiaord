
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_INPUT_CHSC6X_CUSTOM=y

CONFIG_LED=y
CONFIG_GPIO=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_USE_ROLLER=y
CONFIG_LV_USE_SCALE=y
CONFIG_LV_USE_LINE=y
# CONFIG_LV_COLOR_SCREEN_TRANSP=y

# Color theme (LV_CONF_MINIMAL defaults all themes to n, so enable explicitly)
CONFIG_LV_USE_THEME_DEFAULT=y

# RTC (PCF8563 on Seeed XIAO Round Display — enabled via DT alias "rtc")
CONFIG_RTC=y

# Fonts for 240x240 display
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_36=y
CONFIG_LV_FONT_MONTSERRAT_48=y

# performance
# CONFIG_LV_DEF_REFR_PERIOD=10
CONFIG_LV_Z_VDB_SIZE=100

# Peripheral battery level fetching (central reads peripheral BAS characteristic)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y


CONFIG_LOG=y
# CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
